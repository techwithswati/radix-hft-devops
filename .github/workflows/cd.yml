name: 🚢 CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'docker/**'
      - 'kubernetes/**'
      - 'helm/**'
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  AWS_REGION: us-east-1
  HELM_VERSION: 3.13.0

jobs:
  determine-environment:
    name: Determine Target Environment
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.set-env.outputs.env }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine environment from branch
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          else
            echo "env=staging" >> $GITHUB_OUTPUT
          fi

      - name: Generate version
        id: version
        run: |
          VERSION=$(git describe --tags --always --abbrev=7)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  deploy-helm:
    name: Deploy with Helm
    runs-on: ubuntu-latest
    needs: determine-environment
    environment:
      name: ${{ needs.determine-environment.outputs.env }}
      url: https://api.${{ needs.determine-environment.outputs.env }}.radix-hft.com
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name radix-hft-${{ needs.determine-environment.outputs.env }} \
            --region ${{ env.AWS_REGION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Add Helm repositories
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add argocd https://argoproj.github.io/argo-helm
          helm repo update

      - name: Helm dependency update
        run: |
          helm dependency update helm/trading-platform/

      - name: Deploy trading platform
        run: |
          helm upgrade --install trading-platform \
            helm/trading-platform/ \
            --namespace trading \
            --create-namespace \
            --values helm/trading-platform/values-${{ needs.determine-environment.outputs.env }}.yaml \
            --set global.imageTag=${{ needs.determine-environment.outputs.version }} \
            --wait \
            --timeout 10m \
            --atomic

      - name: Wait for deployment rollout
        run: |
          kubectl rollout status deployment/order-service -n trading --timeout=5m
          kubectl rollout status deployment/market-data-service -n trading --timeout=5m
          kubectl rollout status deployment/risk-engine -n trading --timeout=5m
          kubectl rollout status deployment/api-gateway -n trading --timeout=5m

      - name: Post-deployment validation
        run: |
          bash scripts/post-deploy-verify.sh
        env:
          ENVIRONMENT: ${{ needs.determine-environment.outputs.env }}
          NAMESPACE: trading

  argocd-sync:
    name: Trigger ArgoCD Sync
    runs-on: ubuntu-latest
    needs: determine-environment
    if: needs.determine-environment.outputs.env == 'prod'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name radix-hft-prod \
            --region ${{ env.AWS_REGION }}

      - name: Port-forward to ArgoCD
        run: |
          kubectl port-forward svc/argocd-server -n argocd 8080:443 > /dev/null 2>&1 &
          sleep 5

      - name: Retrieve ArgoCD auth token
        id: argocd-token
        run: |
          TOKEN=$(kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Sync ArgoCD Application
        run: |
          argocd app sync trading-platform \
            --grpc-web \
            --server localhost:8080 \
            --username admin \
            --password ${{ steps.argocd-token.outputs.token }}

  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-helm, determine-environment]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name radix-hft-${{ needs.determine-environment.outputs.env }} \
            --region ${{ env.AWS_REGION }}

      - name: Run smoke tests
        run: |
          bash scripts/smoke-tests.sh
        env:
          ENVIRONMENT: ${{ needs.determine-environment.outputs.env }}

  load-test:
    name: Run Load Tests
    runs-on: ubuntu-latest
    needs: [smoke-tests, determine-environment]
    if: needs.determine-environment.outputs.env == 'staging'
    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3232A
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6-stable.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run load test
        run: |
          k6 run k6-tests/trading-load-test.js \
            --vus 100 \
            --duration 5m \
            --out json=results.json
        env:
          API_BASE_URL: https://api.staging.radix-hft.com

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: results.json

  notify-slack:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy-helm]
    if: always()
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment: ${{ needs.determine-environment.outputs.env }} (${{ needs.determine-environment.outputs.version }})*\n*Status:* ${{ job.status }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
