name: 🚢 CD Pipeline

on:
  workflow_run:
    workflows: ["🚀 CI Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, staging, prod]
      image_tag:
        description: "Image tag to deploy"
        required: true
      canary_weight:
        description: "Canary trafffic weight % (prod only)"
        required: false
        default: "5"

env:
  AWS_REGION: us-east-1
  ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}

jobs:
  # ─────────────────────────────────────────
  deploy-dev:
    name: 🔵 Deploy → Dev
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event.inputs.environment == 'dev' }}
    environment:
      name: dev
      url: https://dev.radix-hft.internal
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_DEV }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name radix-hft-dev \
            --region ${{ env.AWS_REGION }}

      - name: Deploy via ArgoCD (Dev auto-sync)
        run: |
          argocd app set trading-platform-dev \
            --helm-set global.imageTag=sha-${{ github.sha }} \
            --server ${{ env.ARGOCD_SERVER }} \
            --auth-token ${{  secrets.ARGOCD_TOKEN }}

          argocd app sync trading-platform-dev \
            --server ${{ env.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_TOKEN }} \
            --timeout 300

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/order-service -n trading --timeout=120s
          kubectl rollout status deployment/market-data-service -n trading --timeout=120s
          kubectl rollout status deployment/risk-engine -n trading --timeout=120s

      - name: Run smoke tests
        run: |
          chmod +x scripts/smoke-tests.sh
          ./scripts/smoke-tests.sh --env dev

  # ─────────────────────────────────────────
  deploy-staging:
    name: 🟡 Deploy → Staging (Blue/Green)
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment:
      name: staging
      url: https://staging.radix-hft.internal
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_STAGING }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name radix-hft-staging \
            --region ${{ env.AWS_REGION }}
            
      - name: Blue/Green deploy via Argo Rollouts
        run: |
          kubectl argo rollouts set image trading-platform \
            trading-platform=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/radix-hft/order-service:sha-${{ github.sha }} \
            -n trading

          kubectl argo rollouts status trading-platform -n trading --timeout=5m

      - name: Run integration tests
        run: |
          chmod +x scripts/integration-tests.sh
          ./scripts/integration-tests.sh --env staging

      - name: Run k6 load test (staging)
        run: |
          docker run --rm \
            -e BASE_URL=https://staging.radix-hft.internal \
            -v $PWD/k6-tests:/scripts \
            grafana/k6:latest run \
            --vus 100 \
            --duration 2m \
            /scripts/trading-load-test.js

      - name: Promote or rollback
        run: |
          kubectl argo rollouts promote trading-platform -n trading

  # ─────────────────────────────────────────
  deploy-prod:
    name: 🟢 Deploy → Production (Canary)
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: prod
      url: https://api.radix-hft.com
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRETS_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_PROD }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name radix-hft-prod \
            --region ${{ env.AWS_REGION }}

      - name: Canary deploy - 5% traffic
        run: |
          kubectl argo rollouts set image trading-platform \
            trading-platform=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/radix-hft/order-service:sha-${{ github.sha }} \
            -n trading-prod
          echo "⏳ Canary at 5% - monitoring for 5 minutes..."
          sleep 300

      - name: Check canary health (5%)
        id: canary-5
        run: |
          chmod +x scripts/canary-health-check.sh
          ./scripts/canary-health-check.sh --threshold 0.1 --env prod

      - name: Canary promote - 25% traffic
        if: steps.canary-5.outcome == 'success'
        run: |
          kubectl argo rollouts promote trading-platform -n trading-prod
          echo "⏳ Canary at 25% - monitoringfor 10 minutes..."
          sleep 600

      - name: Check canary health (25%)
        id: canary-25
        run: |
          ./scripts/canary-health-check.sh --threshold 0.1 --env prod

      - name: Full promote - 100% traffic
        if: steps.canary-25.outcome == 'success'
        run: |
          kubectl argo rollout promote trading-platform -n trading-prod
          echo "✅ Full promotion complete"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Canary failed - initiating rollback"
          kubectl argo rollouts abort trading-platform -n trading-prod
          kubectl argo rollouts undo trading-platform -n trading-prod

      - name: Post-deployment verification
        run: |
          chmod +x scripts/post-deploy-verify.sh
          ./scripts/post-deploy-verify.sh --env prod --version sha-${{ github.sha }}
      
      - name: Create Github release
        uses: softprops/actions-gh-release@v2
        if: startsWith(github.ref, 'ref/tags/')
        with:
          generate_release_notes: true
          body: |
            ## 🚀 Deployment Summary
            - **Version:** `sha-${{ github.sha }}
            - **Environment:** Production
            - **Strategy:** Canary (5% → 25% → 100%)
            - **Deployed by:** ${{ github.actor }}

      - name: Notify PagerDuty (success)
        if: success()
        run: |
          curl -X POST https://events.pagerduty.com/v2/enqueue \
            -H 'Content-Type: application/json' \
            -d '{
              "routing_key": "${{ secrets.PAGERDUTY_ROUTING_KEY }}",
              "event_action": "resolve",
              "payload": {
                "summary": "Production deployment successful: sha-${{ github.sha }}",
                "severity": "info",
                "source": "github-action"
              }
            }'
