name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "radix-devops[bot]"
          git config user.email "devops@radix-hft.com"

      - name: Get version from tag
        id: tag_name
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install git-cliff
        run: |
          curl -sSLf https://github.com/orhun/git-cliff/releases/download/v0.11.2/git-cliff-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv git-cliff /usr/local/bin/

      - name: Generate changelog
        run: |
          git-cliff ${{ steps.tag_name.outputs.VERSION }} > CHANGELOG_RELEASE.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_name.outputs.VERSION }}
          body_path: CHANGELOG_RELEASE.md
          files: |
            CHANGELOG.md
            README.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🚀 Radix HFT Released: ${{ steps.tag_name.outputs.VERSION }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Release: ${{ steps.tag_name.outputs.VERSION }}*\n<${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.tag_name.outputs.VERSION }}|View Release>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  publish-helm-chart:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.13.0'

      - name: Package Helm chart
        run: |
          helm package helm/trading-platform/ --destination ./helm-packages

      - name: Upload Helm chart to releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: helm-packages/*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker-images:
    name: Publish Docker Images (Multi-arch)
    runs-on: ubuntu-latest
    needs: create-release
    
    strategy:
      matrix:
        service: [order-service, market-data-service, risk-engine, api-gateway]
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: docker/${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/radix-hft/${{ matrix.service }}:${{ github.ref_name }}
            ghcr.io/radix-hft/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        run: |
          syft ghcr.io/radix-hft/${{ matrix.service }}:${{ github.ref_name }} \
            -o spdx-json \
            > sbom-${{ matrix.service }}.json

      - name: Upload SBOM
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: sbom-${{ matrix.service }}.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-deployment:
    name: Verify Release Artifacts
    runs-on: ubuntu-latest
    needs: [publish-helm-chart, publish-docker-images]
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Verify Helm chart
        run: |
          helm lint helm/trading-platform/
          helm template trading-platform helm/trading-platform/ | yamllint -

      - name: Verify Docker images exist
        run: |
          for service in order-service market-data-service risk-engine api-gateway; do
            echo "Checking ghcr.io/radix-hft/$service:${{ github.ref_name }}"
            crane digest ghcr.io/radix-hft/$service:${{ github.ref_name }} || exit 1
          done
        env:
          HELM_EXPERIMENTAL_OCI: 1

      - name: Notify Slack Success
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Radix HFT ${{ github.ref_name }} Released Successfully",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ Release Successful: ${{ github.ref_name }}*\n\n• Helm chart published\n• Docker images pushed (amd64, arm64)\n• SBOMs generated\n• Changelog updated"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
