global:
  imageTag: "latest"
  environment: staging
  kafkaBrokers: "b-1.radix-hft-staging-kafka.kafka.us-east-1.amazonaws.com:9094,b-2.radix-hft-staging-kafka.kafka.us-east-1.amazonaws.com:9094,b-3.radix-hft-staging-kafka.kafka.us-east-1.amazonaws.com:9094"
  dbHost: "radix-hft-staging-aurora.us-east-1.rds.amazonaws.com"
  dbPort: 5432
  dbName: "radix_hft_staging"
  redisHost: "radix-hft-staging-redis.cache.amazonaws.com"
  redisPort: 6379

orderService:
  replicaCount: 2
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  config:
    maxOrdersPerSecond: 10000

marketDataService:
  replicaCount: 2
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 16Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75

riskEngine:
  replicaCount: 2
  resources:
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      cpu: 4000m
      memory: 8Gi
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

apiGateway:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
  ingress:
    enabled: true
    hosts:
      - host: api.staging.radix-hft.internal
        paths:
          - path: /
            pathType: Prefix

rollout:
  strategy: blueGreen

networkPolicies:
  enabled: true

serviceMesh:
  enabled: true
  provider: istio
  mTLS: STRICT

prometheus:
  enabled: true
  scrapeInterval: 30s

grafana:
  enabled: true
  dashboards:
    - trading-operations
    - infrastructure

prometheusRules:
  enabled: true

priorityClass:
  create: true
  name: trading-critical
  value: 1000000

topologySpreadConstraints:
  enabled: true
  maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
