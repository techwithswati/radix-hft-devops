{{- if .Values.rbac.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: order-service
  namespace: {{ .Release.Namespace }}
  labels: {{- include "trading-platform.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: market-data-service
  namespace: {{ .Release.Namespace }}
  labels: {{- include "trading-platform.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: risk-engine
  namespace: {{ .Release.Namespace }}
  labels: {{- include "trading-platform.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
  labels: {{- include "trading-platform.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: trading-platform-base
  namespace: {{ .Release.Namespace }}
  labels: {{- include "trading-platform.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["order-service-config", "market-data-service-config", "risk-engine-config", "api-gateway-config"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["order-service-secrets", "market-data-secrets", "risk-engine-secrets", "api-gateway-secrets"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: order-service-binding
  namespace: {{ .Release.Namespace }}
  labels: {{- include "trading-platform.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: order-service
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: trading-platform-base
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: market-data-service-binding
  namespace: {{ .Release.Namespace }}
  labels: {{- include "trading-platform.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: market-data-service
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: trading-platform-base
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: risk-engine-binding
  namespace: {{ .Release.Namespace }}
  labels: {{- include "trading-platform.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: risk-engine
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: trading-platform-base
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-gateway-binding
  namespace: {{ .Release.Namespace }}
  labels: {{- include "trading-platform.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: api-gateway
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: trading-platform-base
  apiGroup: rbac.authorization.k8s.io
{{- end }}
