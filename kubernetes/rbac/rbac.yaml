##############################################################
# Radix HFT — RBAC Configuration
# ServiceAccounts, Roles, RoleBindings for all services
##############################################################

---
# Trading Namespace Service Accounts
apiVersion: v1
kind: ServiceAccount
metadata:
  name: order-service
  namespace: trading
  annotations:
    eks.amazonaws.com/role-arn: ""

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: market-data-service
  namespace: trading
  annotations:
    eks.amazonaws.com/role-arn: ""

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: risk-engine
  namespace: trading
  annotations:
    eks.amazonaws.com/role-arn: ""

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway
  namespace: trading
  annotations:
    eks.amazonaws.com/role-arn: ""

---
# Read-only cluster role for platform ops
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: trading-ops-viewer
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["rollouts", "analysisruns", "analysistemplates"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: trading-ops-viewer-binding
subjects:
  - kind: Group
    name: "radix-hft:trading-ops"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  - kind: ClusterRole
    name: trading-ops-viewer
    apiGroup: rbac.authorization.k8s.io

---
# Platform Engineering — full cluster admin
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-engineering-admin-binding
subjects:
  - kind: Group
    name: "radix-hft:platform-engineering"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  - kind: ClusterRole
    name: cluster-admin
    apiGroup: rbac.authorization.k8s.io

---
# Per-service minimal roles
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: order-service-role
  namespace: trading
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: order-service-role-binding
  namespace: trading
subjects:
  - kind: ServiceAccount
    name: order-service
    namespace: trading
roleRef:
  - kind: Role
    name: order-service-role
    apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: market-data-service-role
  namespace: trading
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: market-data-service-role-binding
  namespace: trading
subjects:
  - kind: ServiceAccount
    name: market-data-service
    namespace: trading
roleRef:
  - kind: Role
    name: market-data-service-role
    apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: risk-engine-role
  namespace: trading
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: risk-engine-role-binding
  namespace: trading
subjects:
  - kind: ServiceAccount
    name: risk-engine
    namespace: trading
roleRef:
  - kind: Role
    name: risk-engine-role
    apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: api-gateway-role
  namespace: trading
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-gateway-role-binding
  namespace: trading
subjects:
  - kind: ServiceAccount
    name: api-gateway
    namespace: trading
roleRef:
  - kind: Role
    name: api-gateway-role
    apiGroup: rbac.authorization.k8s.io
