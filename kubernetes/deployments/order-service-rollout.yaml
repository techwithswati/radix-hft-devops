##############################################################
# Radix HFT — Order Service Rollout
# Argo Rollouts with canary strategy (5%→25%→100%)
# Auto-rollback on error rate threshold
##############################################################
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: order-service
  namespace: trading
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/component: core-trading
    app.kubernetes.io/part-of: radix-hft
    team: trading-ops
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: order-service
  strategy:
    canary:
      steps:
        - setWeight: 5
          pause:
            duration: 5m
          analysis:
            templates:
              - templateName: error-rate
              - templateName: latency-p99
        - setWeight: 25
          pause:
            duration: 10m
          analysis:
            templates:
              - templateName: error-rate
              - templateName: latency-p99
        - setWeight: 100
      trafficRouting:
        istio:
          virtualServices:
            - name: order-service-vs
  template:
    metadata:
      labels:
        app: order-service
        app.kubernetes.io/name: order-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        sidecar.istio.io/inject: "true"
    spec:
      serviceAccountName: order-service
      automountServiceAccountToken: true
      priorityClassName: trading-critical
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      
      # Init container — wait for dependencies
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              for i in $(seq 1 30); do
                nc -zv order-db-writer.trading.svc.cluster.local 5432 && exit 0
                sleep 2
              done
              exit 1

      nodeSelector:
        role: trading-critical

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: order-service
        - maxSkew: 2
          topologyKey: topology.kubernetes.io/hostname
          whenUnsatisfiable: ScheduleName
          labelSelector:
            matchLabels:
              app: order-service

      tolerations:
        - key: workload
          operator: Equal
          value: trading-critical
          effect: NoSchedule

      terminationGracePeriodSeconds: 60

      containers:
        - name: order-service
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/radix-hft/order-service:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 9000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          # Environment — from ConfigMap + Secrets
          envFrom:
            - configMapRef:
                name: order-service-config
            - secretRef:
                name: order-service-secrets

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP

          resources:
            requests:
              cpu: "1000m"
              memory: 2Gi
            limits:
              cpu: "4000m"
              memory: 8Gi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: config
              mountPath: /etc/order-service
              readOnly: true

      volumes:
        - name: tmp
          emptyDir:
            sizelimit: 1Gi
        - name: config
          configMap:
            name: order-service-config

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: order-service-pdb
  namespace: trading
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: order-service

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: trading-critical
value: 1000000
globalDefault: false
description: "Critical trading services — highest priority for scheduling"
