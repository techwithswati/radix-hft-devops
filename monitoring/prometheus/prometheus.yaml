##############################################################
# Prometheus Configuration — Radix HFT
# Scrape targets, recording rules, alerts, long-term storage
##############################################################

global:
  scrape_interval:     30s
  evaluation_interval: 30s
  external_labels:
    cluster:     radix-hft-prod
    environment: prod
    region:      us-east-1
    replica:     "0"

rule_files:
  - '/etc/prometheus/alerts.yaml'
  - '/etc/prometheus/recording-rules.yaml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s
      api_version: v2

scrape_configs:
  # ────────────────────────────────────────────────────
  # Prometheus Self-Scraping
  # ────────────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # ────────────────────────────────────────────────────
  # Kubernetes API Server
  # ────────────────────────────────────────────────────
  - job_name: kubernetes-apiservers
    kubernetes_sd_configs:
      - role: endpoints
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https

  # ────────────────────────────────────────────────────
  # Kubernetes Kubelet
  # ────────────────────────────────────────────────────
  - job_name: kubernetes-nodes
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/${1}/proxy/metrics

  # ────────────────────────────────────────────────────
  # Trading Platform Pods (annotation-based)
  # ────────────────────────────────────────────────────
  - job_name: trading-platform
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - trading
    relabel_configs:
      # Scrape only if prometheus.io/scrape: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      # Use custom scrape port if specified
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        target_label: __address__
        regex: (.+)
        replacement: ${__meta_kubernetes_pod_ip}:$1
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: replace
        target_label: service
    metric_relabel_configs:
      # Add cluster label to all metrics
      - source_labels: [__name__]
        action: replace
        target_label: cluster
        replacement: radix-hft-prod

  # ────────────────────────────────────────────────────
  # Monitoring Namespace (Prometheus/Grafana/Alertmanager)
  # ────────────────────────────────────────────────────
  - job_name: monitoring-stack
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - monitoring
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        target_label: __address__
        regex: (.+)
        replacement: ${__meta_kubernetes_pod_ip}:$1
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod

  # ────────────────────────────────────────────────────
  # AWS RDS Aurora
  # ────────────────────────────────────────────────────
  - job_name: aws-rds-aurora
    static_configs:
      - targets: [cloudwatch.us-east-1.amazonaws.com]
    metrics_path: /api/metrics
    params:
      namespace: [AWS/RDS]
      dimensions: 
        DBClusterIdentifier: [radix-hft-prod-aurora]

  # ────────────────────────────────────────────────────
  # AWS ElastiCache Redis
  # ────────────────────────────────────────────────────
  - job_name: aws-elasticache-redis
    static_configs:
      - targets: [cloudwatch.us-east-1.amazonaws.com]
    metrics_path: /api/metrics
    params:
      namespace: [AWS/ElastiCache]
      dimensions:
        ReplicationGroupId: [radix-hft-prod-redis]

  # ────────────────────────────────────────────────────
  # AWS MSK Kafka
  # ────────────────────────────────────────────────────
  - job_name: kafka
    static_configs:
      - targets:
          - 'kafka-broker-1.internal:11001'
          - 'kafka-broker-2.internal:11001'
          - 'kafka-broker-3.internal:11001'
    relabel_configs:
      - source_labels: [__address__]
        action: replace
        target_label: instance
        regex: (.+):(.+)
        replacement: ${1}

  # ────────────────────────────────────────────────────
  # Istio Service Mesh
  # ────────────────────────────────────────────────────
  - job_name: istio-mesh
    kubernetes_sd_configs:
      - role: endpoint
        namespaces:
          names:
            - istio-system
            - trading
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: istio-telemetry;prometheus
      - action: labelmap
        regex: __meta_kubernetes_service_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_service_name]
        action: replace
        target_label: service

# ────────────────────────────────────────────────────
# Remote Storage Configuration (optional — Thanos)
# ────────────────────────────────────────────────────
remote_write:
  - url: http://thanos-receive:19291/api/v1/receive
    write_relabel_configs:
      - source_labels: [__name__]
        regex: 'up|container_.*|node_.*|kube_.*'
        action: drop
